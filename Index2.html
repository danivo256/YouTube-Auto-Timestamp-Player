<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Timestamp Player</title>

<style>
body {
  margin:0;
  padding:10px;
  background:#000;
  color:#fff;
  font-family:Arial;
}

input, textarea, button {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

#videoBox {
  position:relative;
}

#video {
  width:100%;
}

/* 🔥 FIX: move controls UP */
#centerControls {
  position:absolute;
  top:50%; /* was 60% → overlap fix */
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:8px;
  z-index:10;
}

.hidden { display:none !important; }

.ctrlBtn {
  width:48px;
  height:48px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  color:#00e5ff;
  border:1px solid #00e5ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* toggle */
#toggleBtn {
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border-radius:50%;
  background:#000;
  color:#00e5ff;
  border:1px solid #00e5ff;
  z-index:20;
}

/* 🔥 exit button linked to controls */
#exitFS {
  position:absolute;
  top:8px;
  right:8px;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#000;
  color:#00e5ff;
  border:1px solid #00e5ff;
  z-index:30;
}

/* 🔥 timestamps restored */
#buttons {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
  margin-top:10px;
}

.rangeBtn {
  padding:6px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

.rangeBtn.active {
  background:#00e5ff;
  color:#000;
}

/* history */
.historyItem {
  margin-top:5px;
  padding:6px;
  border:1px solid #222;
}
</style>
</head>

<body>

<input type="file" id="fileInput" accept="video/*">
<textarea id="ranges"></textarea>
<button onclick="loadVideo()">Load</button>

<div id="videoBox">
  <video id="video" controls></video>

  <div id="centerControls">
    <div class="ctrlBtn" onclick="seek(-60)">-60</div>
    <div class="ctrlBtn" onclick="seek(-45)">-45</div>
    <div class="ctrlBtn" onclick="seek(-30)">-30</div>
    <div class="ctrlBtn" onclick="seek(-15)">-15</div>

    <div class="ctrlBtn" onclick="prevSegment()">⏮</div>
    <div class="ctrlBtn" onclick="nextSegment()">⏭</div>

    <div class="ctrlBtn" onclick="seek(15)">+15</div>
    <div class="ctrlBtn" onclick="seek(30)">+30</div>
    <div class="ctrlBtn" onclick="seek(45)">+45</div>
    <div class="ctrlBtn" onclick="seek(60)">+60</div>
  </div>

  <div id="toggleBtn" onclick="toggleControls()">≡</div>
  <div id="exitFS" onclick="exitFS()">⤫</div>
</div>

<div id="buttons"></div>

<h3>History</h3>
<div id="history"></div>

<script>
let video=document.getElementById("video");
let controls=document.getElementById("centerControls");
let exitBtn=document.getElementById("exitFS");
let videoBox=document.getElementById("videoBox");

let segments=[], index=-1, fileName="";
let timeout, manualHidden=false;

/* LOAD */
function loadVideo(){
  let file=document.getElementById("fileInput").files[0];
  if(!file) return;

  fileName=file.name;
  video.src=URL.createObjectURL(file);

  video.onloadedmetadata=()=>{
    video.playbackRate=2;
    restore();

    setTimeout(()=>video.play().catch(()=>{}),200);

    videoBox.requestFullscreen().catch(()=>{});
    if(screen.orientation?.lock) screen.orientation.lock("landscape").catch(()=>{});
  };

  parseSegments();
  makeButtons();
  saveHistory();
}

/* SEGMENTS */
function parseSegments(){
  segments=[];
  let lines=document.getElementById("ranges").value.split("\n");
  lines.forEach((l,i)=>{
    if(!l.includes("-")) return;
    let p=l.split("-");
    segments.push([toSec(p[0]),toSec(p[1]),l]);
  });
}

function makeButtons(){
  let box=document.getElementById("buttons");
  box.innerHTML="";
  segments.forEach((s,i)=>{
    let b=document.createElement("button");
    b.className="rangeBtn";
    b.textContent=s[2];
    b.onclick=()=>playFrom(i);
    box.appendChild(b);
  });
}

function toSec(t){
  let p=t.trim().split(":").map(Number);
  return p[0]*3600+p[1]*60+p[2];
}

/* PLAY */
function playFrom(i){ index=i; playCurrent(); }
function playCurrent(){
  if(index<0||index>=segments.length) return;
  video.currentTime=segments[index][0];
  video.play();
}

/* AUTO */
video.addEventListener("timeupdate",()=>{
  save();

  if(index>=0 && video.currentTime>=segments[index][1]){
    index++;
    if(index<segments.length) playCurrent();
  }
});

/* SEEK */
function seek(s){
  video.currentTime=Math.max(0,video.currentTime+s);
}

/* NAV */
function prevSegment(){ if(index>0){ index--; playCurrent(); } }
function nextSegment(){ if(index<segments.length-1){ index++; playCurrent(); } }

/* CONTROLS */
function toggleControls(){
  manualHidden=!manualHidden;
  updateControls();
}

function updateControls(){
  controls.classList.toggle("hidden",manualHidden);
  exitBtn.classList.toggle("hidden",manualHidden); /* 🔥 sync */
}

video.addEventListener("click",()=>{
  if(!manualHidden){
    controls.classList.remove("hidden");
    exitBtn.classList.remove("hidden");

    clearTimeout(timeout);
    timeout=setTimeout(()=>{
      controls.classList.add("hidden");
      exitBtn.classList.add("hidden");
    },2000);
  }
});

/* EXIT FULLSCREEN */
function exitFS(){
  document.exitFullscreen();
}

/* RESUME */
function save(){
  localStorage.setItem("state",JSON.stringify({
    n:fileName,
    t:video.currentTime,
    i:index,
    r:document.getElementById("ranges").value
  }));
}

function restore(){
  let d=JSON.parse(localStorage.getItem("state")||"null");
  if(!d||d.n!==fileName) return;

  index=d.i;
  video.currentTime=d.t;
  document.getElementById("ranges").value=d.r;
}

/* HISTORY */
function saveHistory(){
  let data=JSON.parse(localStorage.getItem("hist")||"[]");
  data.unshift({name:fileName,ranges:document.getElementById("ranges").value});
  if(data.length>10) data.length=10;
  localStorage.setItem("hist",JSON.stringify(data));
  renderHistory();
}

function renderHistory(){
  let box=document.getElementById("history");
  box.innerHTML="";
  let data=JSON.parse(localStorage.getItem("hist")||"[]");

  data.forEach(d=>{
    let div=document.createElement("div");
    div.className="historyItem";
    div.innerHTML="<b>"+d.name+"</b>";
    div.onclick=()=>{
      document.getElementById("ranges").value=d.ranges;
      alert("Select same file again");
    };
    box.appendChild(div);
  });
}

renderHistory();
</script>

</body>
      </html>
